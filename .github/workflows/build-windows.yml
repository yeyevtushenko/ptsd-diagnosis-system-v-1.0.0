name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirments.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name "PTSD Diagnosis System" --add-data "config;config" --add-data "models;models" --add-data "data;data" main.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: PTSD-Diagnosis-System-Windows
          path: dist/PTSD Diagnosis System.exe